apiVersion: apps/v1
kind: Deployment
metadata:
  name: stargate
spec:
  selector:
    matchLabels:
      app: stargate
  replicas: 1
  # Recreate avoids RWO PVC multi-attach and memory surge on single-node clusters
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: stargate
    spec:
      containers:
        - name: stargate
          image: "{{ .Values.image.stargate.repository }}:{{ .Values.image.stargate.tag }}"
          imagePullPolicy: {{ .Values.image.stargate.pullPolicy }}
          env:
            - name: STARGATE_STORAGE
              value: {{ .Values.stargate.storage | quote }}
            - name: STARGATE_DATA_DIR
              value: {{ .Values.stargate.dataDir | default "/data" | quote }}
            {{- if and (eq .Values.stargate.storage "postgres") .Values.postgres.enabled .Values.stargate.pgDsn }}
            - name: STARGATE_PG_DSN
              value: {{ .Values.stargate.pgDsn | quote }}
            {{- end }}
            - name: STARGATE_PROXY_BASE
              value: {{ .Values.stargate.proxyBase | quote }}
            {{- if .Values.stargate.starlightGguf }}
            - name: STARLIGHT_GGUF
              value: {{ .Values.stargate.starlightGguf | quote }}
            {{- end }}
            - name: STARLIGHT_HF_REPO
              value: {{ .Values.stargate.starlightHfRepo | quote }}
            - name: STARLIGHT_HF_FILE
              value: {{ .Values.stargate.starlightHfFile | quote }}
            - name: STARLIGHT_HF_REVISION
              value: {{ .Values.stargate.starlightHfRevision | quote }}
            - name: BITCOIN_NETWORK
              value: {{ .Values.stargate.bitcoinNetwork | quote }}
            {{- $btcd := .Values.stargate.btcd | default dict }}
            - name: BTCD_MODE
              value: {{ $btcd.mode | default "managed" | quote }}
            - name: BTCD_BIN
              value: {{ $btcd.bin | default "/usr/local/bin/btcd" | quote }}
            - name: BTCD_DATADIR
              {{- if $btcd.dataDir }}
              value: {{ $btcd.dataDir | quote }}
              {{- else }}
              value: {{ printf "%s/btcd" (.Values.stargate.dataDir | default "/data") | quote }}
              {{- end }}
            {{- if $btcd.rpcHost }}
            - name: BTCD_RPC_HOST
              value: {{ $btcd.rpcHost | quote }}
            {{- end }}
            {{- if $btcd.rpcUser }}
            - name: BTCD_RPC_USER
              value: {{ $btcd.rpcUser | quote }}
            {{- end }}
            {{- if $btcd.rpcPass }}
            - name: BTCD_RPC_PASS
              value: {{ $btcd.rpcPass | quote }}
            {{- end }}
            {{- if $btcd.p2pListen }}
            - name: BTCD_P2P_LISTEN
              value: {{ $btcd.p2pListen | quote }}
            {{- end }}
            - name: BTCD_TXINDEX
              value: {{ ($btcd.txIndex | default true) | quote }}
            - name: BTCD_ADDRINDEX
              value: {{ ($btcd.addrIndex | default true) | quote }}
            - name: BTCD_ALLOW_MAINNET
              value: {{ ($btcd.allowMainnet | default false) | quote }}
            {{- if $btcd.extraArgs }}
            - name: BTCD_EXTRA_ARGS
              value: {{ $btcd.extraArgs | quote }}
            {{- end }}
            - name: BLOCKS_DIR
              value: {{ printf "%s/blocks" (.Values.stargate.dataDir | default "/data") | quote }}
            - name: STARGATE_REQUIRE_IMAGE
              value: {{ .Values.stargate.requireImage | quote }}
            - name: STARGATE_INGEST_TOKEN
              {{- if and .Values.secrets.name (or .Values.secrets.createDefault .Values.secrets.stargateIngestToken) }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: stargate-ingest-token
                  optional: true
              {{- else }}
              value: {{ .Values.stargate.ingestToken | quote }}
              {{- end }}
            - name: STARGATE_API_KEY
              {{- if and .Values.secrets.name (or .Values.secrets.createDefault .Values.secrets.stargateApiKey) }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: stargate-api-key
                  optional: true
              {{- else }}
              value: {{ .Values.stargate.apiKey | quote }}
              {{- end }}
            - name: UPLOADS_DIR
              value: {{ printf "%s/uploads" (.Values.stargate.dataDir | default "/data") | quote }}
            - name: IPFS_MIRROR_ENABLED
              value: {{ .Values.stargate.ipfs.mirrorEnabled | quote }}
            - name: IPFS_MIRROR_UPLOAD_ENABLED
              value: {{ .Values.stargate.ipfs.mirrorUploadEnabled | quote }}
            - name: IPFS_MIRROR_DOWNLOAD_ENABLED
              value: {{ .Values.stargate.ipfs.mirrorDownloadEnabled | quote }}
            - name: IPFS_API_URL
              value: {{ .Values.stargate.ipfs.apiUrl | quote }}
            - name: IPFS_MIRROR_TOPIC
              value: {{ .Values.stargate.ipfs.mirrorTopic | quote }}
            - name: IPFS_MIRROR_POLL_INTERVAL_SEC
              value: {{ .Values.stargate.ipfs.mirrorPollIntervalSec | quote }}
            - name: IPFS_MIRROR_PUBLISH_INTERVAL_SEC
              value: {{ .Values.stargate.ipfs.mirrorPublishIntervalSec | quote }}
            - name: IPFS_MIRROR_MAX_FILES
              value: {{ .Values.stargate.ipfs.mirrorMaxFiles | quote }}
            - name: IPFS_HTTP_TIMEOUT_SEC
              value: {{ .Values.stargate.ipfs.httpTimeoutSec | quote }}
            - name: IPFS_INGEST_SYNC_ENABLED
              value: {{ .Values.stargate.ipfs.ingestSyncEnabled | quote }}
            - name: IPFS_INGEST_SYNC_INTERVAL_SEC
              value: {{ .Values.stargate.ipfs.ingestSyncIntervalSec | quote }}
            - name: IPFS_INGEST_SYNC_MANIFEST
              value: {{ .Values.stargate.ipfs.ingestSyncManifest | quote }}
            - name: IPFS_INGEST_SYNC_MAX_ENTRIES
              value: {{ .Values.stargate.ipfs.ingestSyncMaxEntries | quote }}
            - name: IPFS_STEGO_TOPIC
              value: {{ .Values.stargate.ipfs.stegoTopic | quote }}
            - name: IPFS_STEGO_ANNOUNCE_ENABLED
              value: {{ .Values.stargate.ipfs.stegoAnnounceEnabled | quote }}
            - name: IPFS_STEGO_SYNC_ENABLED
              value: {{ .Values.stargate.ipfs.stegoSyncEnabled | quote }}
            - name: IPFS_STEGO_SYNC_INTERVAL_SEC
              value: {{ .Values.stargate.ipfs.stegoSyncIntervalSec | quote }}
            - name: STARGATE_STEGO_APPROVAL_ENABLED
              value: {{ .Values.stargate.stego.approvalEnabled | quote }}
            - name: STARGATE_STEGO_METHOD
              value: {{ .Values.stargate.stego.method | quote }}
            - name: STARGATE_STEGO_ISSUER
              value: {{ .Values.stargate.stego.issuer | quote }}
            - name: STARGATE_STEGO_INGEST_TIMEOUT_SEC
              value: {{ .Values.stargate.stego.ingestTimeoutSec | quote }}
            - name: STARGATE_STEGO_INGEST_POLL_SEC
              value: {{ .Values.stargate.stego.ingestPollSec | quote }}
            - name: STARGATE_STEGO_INSCRIBE_TIMEOUT_SEC
              value: {{ .Values.stargate.stego.inscribeTimeoutSec | quote }}
            - name: STARGATE_STEGO_SCAN_TIMEOUT_SEC
              value: {{ .Values.stargate.stego.scanTimeoutSec | quote }}

            - name: STARGATE_DEFAULT_CLAIM_TTL_HOURS
              value: {{ .Values.stargate.claimTtlHours | quote }}
            - name: STARGATE_SEED_FIXTURES
              value: {{ .Values.stargate.seedFixtures | quote }}
            - name: STARGATE_AGENT_ENABLED
              value: {{ .Values.stargate.agentEnabled | quote }}
            - name: STARGATE_ENABLE_INGEST_SYNC
              value: {{ .Values.stargate.enableIngestSync | quote }}
            - name: STARGATE_ENABLE_FUNDING_SYNC
              value: {{ .Values.stargate.enableFundingSync | quote }}
            - name: STARGATE_FUNDING_PROVIDER
              value: {{ .Values.stargate.fundingProvider | quote }}
            - name: STARGATE_FUNDING_API_BASE
              value: {{ .Values.stargate.fundingApiBase | quote }}
            - name: STARGATE_SYNC_ENABLED
              value: {{ .Values.stargate.syncEnabled | default "true" | quote }}

            - name: STARGATE_INGEST_SYNC_INTERVAL
              value: {{ .Values.stargate.ingestSyncInterval | quote }}
            - name: IPFS_ENABLED
              value: {{ .Values.stargate.ipfs.enabled | quote }}
            {{- if .Values.stargate.ipfs.enabled }}
            - name: IPFS_EMBEDDED_ENABLED
              value: {{ .Values.stargate.ipfs.embeddedEnabled | quote }}
            - name: IPFS_EMBEDDED_LISTEN
              value: {{ printf "/ip4/0.0.0.0/tcp/%d" (int .Values.stargate.ipfs.swarmPort) | quote }}
            {{- /* Private mesh by default. Set bootstrap to multiaddrs or "public" (CPU-heavy). */}}
            - name: IPFS_EMBEDDED_BOOTSTRAP
              value: {{ .Values.stargate.ipfs.embeddedBootstrap | default "" | quote }}
            - name: IPFS_JOIN_PUBLIC_IPFS
              value: {{ .Values.stargate.ipfs.joinPublicIpfs | default false | quote }}
            - name: IPFS_DHT_MODE
              value: {{ .Values.stargate.ipfs.dhtMode | default "client" | quote }}
            - name: IPFS_PUBSUB_PEER_EXCHANGE
              value: {{ .Values.stargate.ipfs.pubsubPeerExchange | default false | quote }}
            - name: IPFS_LIBP2P_LOW_WATER
              value: {{ .Values.stargate.ipfs.libp2pLowWater | default 10 | quote }}
            - name: IPFS_LIBP2P_HIGH_WATER
              value: {{ .Values.stargate.ipfs.libp2pHighWater | default 40 | quote }}
            {{- end }}
            - name: STARLIGHT_DONATION_ADDRESS
              value: {{ .Values.stargate.donationAddress | quote }}
            {{- if .Values.ca.crt }}
            - name: SSL_CERT_FILE
              value: /etc/ssl/certs/ca.crt
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.ca.crt }}
            - name: custom-ca
              mountPath: /etc/ssl/certs/ca.crt
              subPath: ca.crt
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.stargate.port }}
            {{- if .Values.stargate.ipfs.enabled }}
            - name: ipfs-swarm
              containerPort: {{ .Values.stargate.ipfs.swarmPort }}
              protocol: TCP
            {{- end }}
            {{- $btcdPort := (.Values.stargate.btcd).p2pPort | default 0 }}
            {{- if and (.Values.stargate.btcd) (gt (int $btcdPort) 0) }}
            - name: btcd-p2p
              containerPort: {{ int $btcdPort }}
              protocol: TCP
            {{- end }}
          {{- $probes := .Values.stargate.probes | default dict }}
          {{- $startup := $probes.startup | default dict }}
          {{- $ready := $probes.readiness | default dict }}
          {{- $live := $probes.liveness | default dict }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.stargate.port }}
            initialDelaySeconds: {{ $ready.initialDelaySeconds | default 5 }}
            periodSeconds: {{ $ready.periodSeconds | default 10 }}
            timeoutSeconds: {{ $ready.timeoutSeconds | default 3 }}
            failureThreshold: {{ $ready.failureThreshold | default 3 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.stargate.port }}
            initialDelaySeconds: {{ $live.initialDelaySeconds | default 60 }}
            periodSeconds: {{ $live.periodSeconds | default 30 }}
            timeoutSeconds: {{ $live.timeoutSeconds | default 5 }}
            failureThreshold: {{ $live.failureThreshold | default 5 }}
          startupProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.stargate.port }}
            # Covers managed btcd RPC wait (~2m) + app bootstrap; IBD continues after ready.
            initialDelaySeconds: {{ $startup.initialDelaySeconds | default 10 }}
            periodSeconds: {{ $startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ $startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ $startup.failureThreshold | default 60 }}
          resources:
{{ toYaml .Values.resources.stargate | default "{}" | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stargate-blocks-pvc
        {{- if .Values.ca.crt }}
        - name: custom-ca
          secret:
            secretName: custom-ca
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: stargate
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3001"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: stargate
  ports:
    - name: http
      port: 3001
      targetPort: {{ .Values.stargate.port }}
    {{- if .Values.stargate.ipfs.enabled }}
    - name: ipfs-swarm
      port: {{ .Values.stargate.ipfs.swarmPort }}
      targetPort: {{ .Values.stargate.ipfs.swarmPort }}
      protocol: TCP
    {{- end }}
    {{- $btcdSvc := .Values.stargate.btcd | default dict }}
    {{- $btcdP2P := $btcdSvc.p2pPort | default 0 }}
    {{- if and ($btcdSvc.p2pServiceEnabled | default false) (gt (int $btcdP2P) 0) }}
    - name: btcd-p2p
      port: {{ int $btcdP2P }}
      targetPort: {{ int $btcdP2P }}
      protocol: TCP
    {{- end }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stargate-blocks-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.stargate.blocksStorage }}
  {{- if .Values.stargate.storageClass }}
  storageClassName: {{ .Values.stargate.storageClass | quote }}
  {{- end }}
