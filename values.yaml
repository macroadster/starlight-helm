image:
  stargate:
    repository: macroadster/stargate
    tag: v1
    pullPolicy: IfNotPresent
  ipfs:
    repository: ipfs/kubo
    tag: "v0.27.0"
    pullPolicy: IfNotPresent
  postgres:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent

postgres:
  # Optional shared DB. Disabled by default — Stargate uses SQLite on the data PVC.
  enabled: false
  user: stargate
  password: stargate
  database: stargate
  port: 5432
  storage: 1Gi

stargate:
  # sqlite (default) | postgres | memory | filesystem
  # SQLite files live under STARGATE_DATA_DIR/sqlite on the blocks PVC (/data/sqlite).
  storage: sqlite
  # Only used when postgres.enabled=true and storage=postgres
  pgDsn: "postgres://stargate:stargate@stargate-postgres:5432/stargate?sslmode=disable"
  # Root data dir in-container (PVC mount). SQLite DBs: {dataDir}/sqlite/*.db
  # Also holds btcd chainstate at {dataDir}/btcd when btcd.mode=managed.
  dataDir: /data
  port: 3001
  proxyBase: ""
  # PVC size for app data + btcd full-node chainstate (testnet4+indexes is multi-GB).
  # Existing PVCs are not resized automatically — expand the claim / storage class if needed.
  blocksStorage: 50Gi
  storageClass: ""
  ingestToken: ""
  apiKey: "demo-api-key"
  # Matches stargate BITCOIN_NETWORK default (testnet4). Mainnet requires btcd.allowMainnet=true.
  bitcoinNetwork: "testnet4"
  requireImage: true
  donationAddress: ""
  # Embedded / external btcd full node (no mining). See ADR 0006 in stargate repo.
  btcd:
    # managed = spawn btcd in-process container; external = BTCD_RPC_HOST only; off = Esplora fallback
    mode: managed
    bin: /usr/local/bin/btcd
    # Empty => {dataDir}/btcd on the data PVC (persists across restarts)
    dataDir: ""
    # Empty => network default (e.g. 127.0.0.1:48334 for testnet4)
    rpcHost: ""
    rpcUser: ""
    rpcPass: ""
    # P2P listen inside the container (outbound works without Service exposure)
    p2pListen: "0.0.0.0:48333"
    # Container/Service port for inbound P2P; set 0 to omit the port
    p2pPort: 48333
    # Expose P2P on the stargate Service (optional; peers can still dial out)
    p2pServiceEnabled: false
    txIndex: true
    addrIndex: true
    allowMainnet: false
    extraArgs: ""
  # Probes: startup must cover managed btcd RPC wait (up to ~2m) + app init.
  probes:
    startup:
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 60
      timeoutSeconds: 5
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
    liveness:
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
  # starlight detector (native Trin/GGUF in stargate; no starlight-api pod)
  starlightGguf: ""           # optional local path override; empty = data dir + HF
  starlightHfRepo: "macroadster/starlight-prod"
  starlightHfFile: "starlight.gguf"
  starlightHfRevision: "main"
  ipfs:
    enabled: true
    embeddedEnabled: true
    swarmPort: 4001
    # Private mesh by default. Leave empty for mDNS-only peer discovery.
    # Comma-separated multiaddrs for known stargate peers, or "public" to join
    # the public IPFS DHT (burns multi-core CPU — avoid in production).
    embeddedBootstrap: ""
    joinPublicIpfs: false
    dhtMode: "client"            # client | server | auto
    pubsubPeerExchange: false    # aggressive mesh growth; keep off
    libp2pLowWater: 10
    libp2pHighWater: 40
    mirrorEnabled: false
    mirrorUploadEnabled: true
    mirrorDownloadEnabled: true
    apiUrl: "http://stargate-ipfs:5001"
    mirrorTopic: "stargate-uploads"
    mirrorPollIntervalSec: 10
    mirrorPublishIntervalSec: 30
    mirrorMaxFiles: 2000
    httpTimeoutSec: 30
    ingestSyncEnabled: false
    ingestSyncIntervalSec: 60
    ingestSyncManifest: "stargate-uploads-manifest.json"
    ingestSyncMaxEntries: 5000
    stegoTopic: "stargate-stego"
    stegoAnnounceEnabled: true
    stegoSyncEnabled: true
    stegoSyncIntervalSec: 10
  stego:
    approvalEnabled: false
    method: "lsb"
    issuer: ""
    ingestTimeoutSec: 30
    ingestPollSec: 2
    inscribeTimeoutSec: 60
    scanTimeoutSec: 30
  claimTtlHours: 72
  seedFixtures: false
  agentEnabled: true
  enableIngestSync: true  # Enable ingestion sync
  enableFundingSync: true
  syncEnabled: true       # Generic MCP state sync over IPFS pubsub. Only stargate-uploads mirror is the official path. This is disabled in production-like setups to avoid resource use on unproven secondary mechanisms.
  fundingProvider: "blockstream"
  fundingApiBase: ""
  ingestSyncInterval: "30s"

ipfs:
  enabled: true
  enablePubsub: true
  routing: dhtclient
  profile: lowpower
  apiPort: 5001
  gatewayPort: 8080
  swarmPort: 4001
  storage: 5Gi
  storageClass: ""

resources:
  stargate:
    # btcd full node + indexes needs more headroom than the old explorer-poll path
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  ipfs:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  postgres:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

secrets:
  createDefault: false
  name: stargate-stack-secrets
  stargateApiKey: ""
  stargateIngestToken: ""

hpa:
  stargate:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPU: 70

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-access-log: "true"
  frontendHost: starlight.local
  backendHost: stargate.local
  tls:
    - secretName: stargate-stack-tls
      hosts:
        - starlight.local
        - stargate.local
  ipfsSwarm:
    enabled: true
    port: 4001
    # Dedicated Service for the IPFS swarm port (recommended).
    # This creates a separate Service (LoadBalancer/NodePort) that directly
    # exposes the stargate TCP swarm port without relying on ingress-nginx hacks.
    service:
      enabled: true
      name: stargate-swarm
      type: LoadBalancer
      annotations: {}
      loadBalancerIP: ""
      externalTrafficPolicy: ""
    # Legacy/advanced: write an entry into ingress-nginx's tcp-services ConfigMap.
    # This only works if your ingress-nginx controller was installed with TCP
    # port support AND its Service has port 4001 exposed. Usually better to use
    # the dedicated service above instead.
    tcpConfigMap:
      create: false
      name: tcp-services
      namespace: ingress-nginx

# Custom CA certificate.
# Provide the base64-encoded CA certificate content here.
# For example:
# ca:
#   crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
ca:
  crt: ""
